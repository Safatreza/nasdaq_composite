name: RSL Nasdaq-100 Update

on:
  schedule:
    # Anchored to Monday 16:00 German time, then every 8 hours until Friday night.
    # GitHub cron runs in UTC: 14:00 UTC = 16:00 CEST (summer) / 15:00 CET (winter).
    - cron: '0 14,22 * * 1'    # Mon 16:00 and 24:00 German time
    - cron: '0 6,14,22 * * 2-5'  # Tue-Fri 08:00, 16:00, 24:00 German time
  workflow_dispatch:  # Manual trigger also available

jobs:
  update-nasdaq-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RSL Nasdaq-100 screening
        run: python run_nasdaq_live.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Validate output (require ≥ 90 stocks)
        run: |
          python - <<'EOF'
          import json, sys, os
          path = 'web/data/nasdaq_rankings.json'
          if not os.path.exists(path):
              print("ERROR: JSON file not found — run_nasdaq_live.py may have crashed.")
              sys.exit(1)
          with open(path) as f:
              data = json.load(f)
          total = data['metadata']['total_analyzed']
          failed = data['metadata']['failed']
          print(f"Analyzed: {total}, Failed: {failed}")
          if total < 90:
              print(f"ERROR: only {total} stocks analyzed — aborting commit.")
              sys.exit(1)
          EOF

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data/nasdaq_rankings.json
          git diff --cached --quiet || git commit -m "chore: Nasdaq-100 RSL update $(date +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Trigger Vercel deployment
        continue-on-error: true
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK_URL" ]; then
            curl -X POST "$VERCEL_DEPLOY_HOOK_URL"
          else
            echo "No VERCEL_DEPLOY_HOOK_URL set — Vercel will deploy automatically from the git push."
          fi
